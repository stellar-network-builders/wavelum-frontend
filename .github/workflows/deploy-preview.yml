name: Deploy Preview

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: preview-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Vercel preview deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel credentials
        id: creds
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel preview skipped — VERCEL_TOKEN secret is not configured."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.creds.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Deploy to Vercel (preview)
        if: steps.creds.outputs.configured == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          vercel build --token="$VERCEL_TOKEN"
          DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "PREVIEW_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
          echo "::notice::Preview deployed to $DEPLOY_URL"

      - name: Comment preview URL on PR
        if: steps.creds.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            if (!url) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Preview deployment ready:** ${url}`,
            });
