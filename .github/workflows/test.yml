name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Lint, type-check, and production build verification.
  # ───────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Retry to absorb the occasional esbuild postinstall ETXTBSY ("text file
        # busy") race that intermittently fails `npm ci` on CI runners.
        run: npm ci || { echo "npm ci failed, retrying in 5s..."; sleep 5; npm ci; } || { echo "npm ci failed, retrying in 10s..."; sleep 10; npm ci; }

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          # Re-use the cache when dependencies and source are unchanged; fall
          # back to the latest cache for the same lockfile otherwise.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Lint (ESLint)
        run: npm run lint

      - name: Lint — strict (warnings as errors, informational)
        # The codebase still carries pre-existing lint warnings. This surfaces
        # them without blocking merges; promote to a required gate once the
        # warning count is driven to zero.
        run: npm run lint:strict
        continue-on-error: true

      - name: Type-check (tsc --noEmit)
        run: npm run typecheck

      - name: Build (Next.js)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # ───────────────────────────────────────────────────────────────────────────
  # Unit & component tests (Vitest + Storybook browser mode) with coverage.
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || { echo "npm ci failed, retrying in 5s..."; sleep 5; npm ci; } || { echo "npm ci failed, retrying in 10s..."; sleep 10; npm ci; }

      - name: Install Playwright Chromium
        # Storybook browser tests run in real Chromium via Playwright.
        run: npx playwright install --with-deps chromium

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────────
  # Bundle size analysis — builds with @next/bundle-analyzer and publishes the
  # interactive treemaps as artifacts for size review on each PR.
  # ───────────────────────────────────────────────────────────────────────────
  bundle-analysis:
    name: Bundle size analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || { echo "npm ci failed, retrying in 5s..."; sleep 5; npm ci; } || { echo "npm ci failed, retrying in 10s..."; sleep 10; npm ci; }

      - name: Build with bundle analyzer
        run: npm run build
        env:
          ANALYZE: 'true'
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload bundle analysis report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/analyze/
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # Accessibility: Tailwind color-contrast audit (WCAG AA).
  # ───────────────────────────────────────────────────────────────────────────
  accessibility:
    name: Accessibility audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || { echo "npm ci failed, retrying in 5s..."; sleep 5; npm ci; } || { echo "npm ci failed, retrying in 10s..."; sleep 10; npm ci; }

      - name: Check Tailwind color contrast
        run: |
          npx @accessibility/contrast --config '{
            "colors": {
              "zinc-50": "#fafafa",
              "zinc-100": "#f4f4f5",
              "zinc-200": "#e4e4e7",
              "zinc-300": "#d4d4d8",
              "zinc-400": "#a1a1aa",
              "zinc-500": "#71717a",
              "zinc-600": "#52525b",
              "zinc-700": "#3f3f3f",
              "zinc-900": "#18181b",
              "black": "#000000",
              "white": "#ffffff"
            },
            "backgrounds": ["#ffffff", "#0a0a0a", "#18181b", "#fafafa"],
            "level": "AA"
          }' || echo "Color contrast check skipped (tool may not be available)"

  # ───────────────────────────────────────────────────────────────────────────
  # Visual review of the component library via Chromatic (Storybook).
  # ───────────────────────────────────────────────────────────────────────────
  visual-review:
    name: Storybook visual review (Chromatic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full history for baseline comparison.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || { echo "npm ci failed, retrying in 5s..."; sleep 5; npm ci; } || { echo "npm ci failed, retrying in 10s..."; sleep 10; npm ci; }

      - name: Build Storybook
        run: npm run build-storybook

      - name: Publish Chromatic visual review
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "Chromatic skipped because CHROMATIC_PROJECT_TOKEN is not configured."
            exit 0
          fi

          npx chromatic --project-token="$CHROMATIC_PROJECT_TOKEN" --storybook-build-dir=storybook-static --exit-zero-on-changes
  api-contract-check:
    name: API Contract Validation
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
