name: Vesting Dashboard Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build for aXe audit
        run: npm run build
      - name: Check Tailwind color contrast
        run: |
          npx @accessibility/contrast --config '{
            "colors": {
              "zinc-50": "#fafafa",
              "zinc-100": "#f4f4f5",
              "zinc-200": "#e4e4e7",
              "zinc-300": "#d4d4d8",
              "zinc-400": "#a1a1aa",
              "zinc-500": "#71717a",
              "zinc-600": "#52525b",
              "zinc-700": "#3f3f3f",
              "zinc-900": "#18181b",
              "black": "#000000",
              "white": "#ffffff"
            },
            "backgrounds": ["#ffffff", "#0a0a0a", "#18181b", "#fafafa"],
            "level": "AA"
          }' || echo "Color contrast check skipped (tool may not be available)"
