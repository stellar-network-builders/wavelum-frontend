name: Visual Regression

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: visual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Playwright screenshot comparison
    runs-on: ubuntu-latest
    # Informational until baselines exist in `e2e/visual-baselines/`.
    # Once baselines are committed, remove `continue-on-error` to make this a
    # required, blocking gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run visual regression tests
        run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
