name: Bug report
description: Report a reproducible problem with the Wavelum frontend
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Wavelum. Please search existing issues before submitting a report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong, and what were you trying to do?
      placeholder: Describe the problem and its impact.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Give the smallest reliable sequence that demonstrates the problem.
      placeholder: |
        1. Go to ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include exact error messages when available.
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser reproduces the issue?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: operating_system
    attributes:
      label: Operating system
      description: Include the OS name and version.
      placeholder: macOS 15.5, Windows 11, Ubuntu 24.04, Android 16, or iOS 19
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Add visuals that clarify the problem. Remove sensitive account or wallet information first.
      placeholder: Drag and drop screenshots or recordings here.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets, private keys, seed phrases, and other sensitive data from this report.
          required: true
